spring:
  application:
    name: app
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:insightrecruit}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: true
    baseline-on-migrate: true
insightrecruit:
  queue:
    candidate-upload-topic: ${CANDIDATE_UPLOAD_TOPIC:insightrecruit:candidates:uploaded}
  storage:
    upload-dir: ${UPLOAD_DIR:uploads/resumes}
  security:
    jwt-secret: ${JWT_SECRET}
    access-token-ttl-minutes: ${ACCESS_TOKEN_TTL_MINUTES:15}
    refresh-token-ttl-days: ${REFRESH_TOKEN_TTL_DAYS:7}
    otp-ttl-seconds: ${OTP_TTL_SECONDS:300}
    otp-rate-limit-max: ${OTP_RATE_LIMIT_MAX:3}
    otp-rate-limit-window-seconds: ${OTP_RATE_LIMIT_WINDOW_SECONDS:300}
    refresh-cookie-name: ${REFRESH_COOKIE_NAME:insight_refresh_token}
  ai:
    llm-api-key: ${LLM_API_KEY}
    base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
    model: ${LLM_MODEL:gpt-4o-mini}
    temperature: ${LLM_TEMPERATURE:0.2}