version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: insight_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: insightrecruit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: insight_queue
    ports:
      - "6379:6379"

volumes:
  pgdata: